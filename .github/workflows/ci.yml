name: Code Quality Check (CI)

on:
  pull_request:
    branches:
      - main
      - develop

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v3
        with:
          version: 10 # Matches your local pnpm version

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'pnpm'

      - name: Install Dependencies
        run: pnpm install

      - name: Type Check
        run: pnpm exec tsc --noEmit
        # This ensures TypeScript interfaces and types are valid
        # without generating actual JS files.

      - name: Build Check
        run: pnpm run build
        # This catches Next.js specific errors like broken
        # links or environment variable requirements.